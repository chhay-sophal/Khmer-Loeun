<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ខ្មែរលឿន</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 280px;
      background: #0D0D12;
      color: #E8E6E1;
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      font-size: 13px;
      -webkit-font-smoothing: antialiased;
      user-select: none;
    }

    .wrap {
      padding: 20px 20px 18px;
    }

    /* ── Header ── */
    .header {
      margin-bottom: 16px;
    }

    .title {
      font-family: 'Noto Serif Khmer', 'Khmer OS Muol Light', 'Khmer OS', serif;
      font-size: 26px;
      line-height: 1.25;
      color: #E8E6E1;
      letter-spacing: -0.01em;
    }

    .subtitle {
      margin-top: 5px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #3E3D4D;
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: #1C1B24;
      margin-bottom: 16px;
    }

    /* ── Toggle row ── */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .toggle-info {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .state-label {
      font-size: 14px;
      font-weight: 500;
      color: #E8E6E1;
      transition: color 200ms ease;
    }

    .state-label.off {
      color: #5C5B6A;
    }

    .desc-label {
      font-size: 11px;
      color: #3E3D4D;
      transition: color 180ms ease;
    }

    .desc-label.on {
      color: #5C5B6A;
    }

    /* ── Switch ── */
    .switch {
      position: relative;
      width: 48px;
      height: 26px;
      flex-shrink: 0;
      background: #242330;
      border-radius: 13px;
      border: none;
      cursor: pointer;
      transition: background 220ms cubic-bezier(0.2, 0, 0, 1);
      outline: none;
    }

    .switch::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #4A4959;
      transition:
        transform 220ms cubic-bezier(0.2, 0, 0, 1.1),
        background 220ms ease,
        box-shadow 220ms ease;
    }

    .switch[aria-checked="true"] {
      background: #F5A623;
    }

    .switch[aria-checked="true"]::after {
      transform: translateX(22px);
      background: #fff;
      box-shadow: 0 1px 6px rgba(245, 166, 35, 0.45);
    }

    .switch:focus-visible {
      outline: 2px solid #F5A623;
      outline-offset: 3px;
      border-radius: 14px;
    }

    @media (prefers-reduced-motion: reduce) {
      .switch,
      .switch::after,
      .state-label,
      .desc-label {
        transition: none;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="header">
      <div class="title">ខ្មែរលឿន</div>
      <div class="subtitle">Khmer Loeun</div>
    </header>

    <div class="divider"></div>

    <div class="toggle-row">
      <div class="toggle-info">
        <span class="state-label" id="stateLabel">Active</span>
        <span class="desc-label on" id="descLabel">Converting as you type</span>
      </div>
      <button
        class="switch"
        id="toggle"
        role="switch"
        aria-checked="true"
        aria-label="Toggle extension"
      ></button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
